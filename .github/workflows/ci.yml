name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://tradeping:tradeping@localhost:5432/tradeping?schema=public
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm scripts:check
      - run: corepack pnpm db:generate
      - run: corepack pnpm lint
      - run: corepack pnpm test
      - run: corepack pnpm build
      - run: corepack pnpm audit --prod --audit-level=high

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Build production image
        run: docker build -t tradeping-api:ci .
